name: riverpod_reducer
description: A pure reducer pattern for Riverpod notifiers. Separates state initialization from reactive bindings with a single reduce(State, Event) → State function.
version: 0.1.0
repository: https://github.com/loreium/riverpod_reducer
publisher: loreium.app
topics:
  - riverpod
  - state-management
  - reducer

environment:
  sdk: ^3.7.0

dependencies:
  riverpod: ^3.0.0
  meta: ^1.11.0

dev_dependencies:
  coverage: ^1.9.0
  lints: ^6.0.0
  test: ^1.25.6
